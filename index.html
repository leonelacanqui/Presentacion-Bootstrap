<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <title>Sobre Leonela</title>
  </head>

  <body class="bg-danger-subtle">
    <div class="container py-5">
      <!-- Presentación -->
      <div class="row justify-content-center mb-5">
        <div class="col-12 col-md-10 col-lg-8">
          <div class="bg-light text-dark text-center p-5 rounded-4 shadow-lg">
            <!-- Imagen de gato -->
            <img
              src="https://images.unsplash.com/photo-1519052537078-e6302a4968d4?q=80&w=800&auto=format&fit=crop"
              class="rounded-circle mb-4 shadow"
              width="200"
              height="200"
              alt="gato"
            />

            <h1 class="display-4 fw-bold text-danger">Hola, Soy Leonela ♡</h1>

            <p class="lead mt-3">
              Estudiante apasionada por la programación y el diseño web ✨
            </p>

            <button class="btn btn-outline-danger btn-lg mt-3">
              Bienvenidos ⭐
            </button>
          </div>
        </div>
      </div>

      <!-- Información -->
      <div class="row g-4">
        <div class="col-12 col-md-6">
          <div
            class="card border-0 shadow-lg h-100 rounded-4 bg-primary-subtle"
          >
            <div class="card-body text-center p-5">
              <h2 class="text-primary fw-bold">Sobre Mí ♡</h2>

              <p class="mt-3 fs-5">
                Me gusta aprender nuevas tecnologías y crear páginas web
                modernas utilizando Bootstrap ✨
              </p>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-6">
          <div
            class="card border-0 shadow-lg h-100 rounded-4 bg-warning-subtle"
          >
            <div class="card-body text-center p-5">
              <h2 class="text-warning-emphasis fw-bold">Mis Hobbies ⭐</h2>

              <p class="mt-3 fs-5">
                Disfruto diseñar interfaces, escuchar música y practicar
                programación 💜
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
